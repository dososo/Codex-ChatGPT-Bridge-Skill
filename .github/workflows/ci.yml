name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q bridge .agents/skills/codex-chatgpt-bridge/scripts scripts examples tests
      - name: Core tests
        run: >
          python -m unittest
          tests.test_bridge_health
          tests.test_task_flow
          tests.test_tool_schemas
          tests.test_mcp_protocol
          tests.test_http_auth
          tests.test_secret_scan
          tests.test_redaction
          tests.test_path_safety
          tests.test_review_result
          tests.test_intake_chatgpt_result
          tests.test_push_task_confirmation
          tests.test_fallback_and_capability
          tests.test_chatgpt_collaboration_message
      - name: First-run dry run
        run: python .agents/skills/codex-chatgpt-bridge/scripts/verify_first_use.py --dry-run --json
      - name: Collaboration session preview
        run: python scripts/build_chatgpt_collaboration_session.py --dry-run --json
      - name: Mini calculator example
        run: python -m unittest discover -s examples/mini-calculator -p 'test_*.py'
